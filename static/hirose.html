<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- リセットcss -->
    <link rel="stylesheet" href="https://unpkg.com/modern-css-reset/dist/reset.min.css" />
    <style>
        /* ヘッダーレイアウト */
        .bg_deader {
            /* ヘッダーを固定する */
            position: fixed;
            /* 画面の上部に固定 */
            top: 0;
            /* 画面の幅いっぱいに広げる */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            height: 100px;
        }

        /* クリッピングマスク */
        img.image-circle2 {
            width: 4rem;
            height: 4rem;
            object-fit: none;
            border-radius: 50%;
        }

        form {
            border: none;
        }

        label {
            font-weight: bold;
            color: #fff;
        }

        /* プルダウン関係 */
        .pulldown {
            outline: none;
        }

        /* ボタン関係 */
        button {
            text-decoration: none;
            width: 135px;
            height: 45px;
            margin: auto;
            /* padding: 0.5rem; */
            font-weight: bold;
            color: #fff;
            /* 角丸 */
            border-radius: 10px;
            transition: 0.5s;
            /* ドロップジャドウ */
            box-shadow: 0px 0px 3px 3px rgba(255, 255, 255, 0.3);
        }

        button.gazou {
            border: 3px solid #77FF00;
            background: #52BC77;
        }

        button.gazou:hover {
            color: #52BC77;
            background: #fff;
        }

        button.delete {
            width: 90px;
            border: 3px solid #FF0000;
            background: #AC0000;
        }

        button.delete:hover {
            color: #AC0000;
            background: #fff;
        }

        button.update {
            width: 330px;
        }

        button.return {
            border: 3px solid #FF00ED;
            background: #B53DAD;
        }

        button.return:hover {
            color: #B53DAD;
            background: #fff;
        }

        /* メニュー */
        a {
            display: block;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }

        .menu {
            display: flex;
            justify-content: center;
            align-items: center;
            /* padding: 15px; */
        }

        .menu .item {
            width: 145px;
            height: 105px;
            background: #8B0482;
            width: calc(50% - 13px);
            margin-right: 20px;
        }

        /* このクラスは、ダミー（ヘッダーに隠れるため、上部、左右に余白を追加） */
        .dummy {
            margin-top: 150px;
            margin-left: 20px;
            margin-right: 20px;
        }
    </style>
</head>

<body>
    <header>
        <div class="bg_deader">
            <img src="ダミー.png" alt="大会の画像" class="image-circle2">
            <h1 style="color: white; padding-left: 1rem;">大会名</h1>
        </div>
    </header>

    <!-- ドロップシャドウ等を見やすくするため、仮背景を配置 -->
    <!-- mainのstyleを削除する -->
    <main style="background: #50014A;">
        <form action="#" class="dummy pulldown">
            <div>
                <!-- プルダウン + ラベル -->
                <label for="prefecture" style="font-weight: bold;">順位</label><br>
                <select id="prefecture" name="prefecture">
                    <option value="">選択</option>
                    <option value="1">1位</option>
                    <option value="2">2位</option>
                    <option value="3">3位</option>
                    <option value="4">4位</option>
                </select>
            </div>

            <!-- テキストボックス -->
            <div>
                <label for="comment">コメント</label><br>
                <input type="text" id="comment" name="comment">
            </div>

            <!-- テキストエリア -->
            <div>
                <label for="">競技説明</label><br>
                <textarea name="comment" id="comment" cols="150" rows="8"></textarea>
            </div>

            <!-- ボタン各種 -->
            <!-- 画像選択 -->
            <div>
                <button type="submit" class="gazou">画像選択</button>
            </div>
            <!-- 削除 -->
            <div>
                <button type="submit" class="delete">削除</button>
            </div>
            <!-- 更新 -->
            <div>
                <button type="submit" class="update gazou">更新</button>
            </div>
            <div>
                <button type="button" class="update return">戻る</button>
            </div>
        </form>

        <!-- メニュー -->
        <div class="menu">
            <!-- home -->
            <div class="item">
                <a href="../templates/index.html"><img src="img_icon/Home.webp" alt="home">home</a>
            </div>
            <!-- schedule -->
            <div class="item">
                <a href="../templates/index.html"><img src="img_icon/Calendar.webp" alt="home">schedule</a>
            </div>
        </div>
    </main>
</body>

</html>

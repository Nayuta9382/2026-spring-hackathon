<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- リセットcss -->
    <link rel="stylesheet" href="https://unpkg.com/modern-css-reset/dist/reset.min.css" />

    <!-- 自作css -->
    <link rel="stylesheet" href="./css/all_style.css">
    <style>
        

        /* メニュー */
        .menu_link {
            /* 中身を揃える */
            display: block;
            text-align: center;
            /* 上下の中央揃え */
            align-content: center;
            color: #fff;
            font-weight: bold;
        }

        .menu {
            display: flex;
            justify-content: center;
            text-decoration: none;
        }

        .item {
            /* width: 145px; */
            /* height: 105px; */
            width: 100%;
            height: 90%;
            background: #8B0482;
            margin: 15px;
        }

        /* 画像の写真フレーム化 */
        .frame {
            object-fit: contain;
            width: 100%;
            height: 55px;
        }

        
    </style>
</head>

<body>
    <header>
        <div class="bg_deader">
            <img src="img/icon/ダミー.png" alt="大会の画像" class="image_circle2">
            <h1 style="color: white; padding-left: 1rem;">大会名</h1>
        </div>
    </header>

    <!-- ドロップシャドウ等を見やすくするため、仮背景を配置 -->
    <!-- mainのstyleを削除する -->
    <main style="background: #50014A;">
        <form action="#" class="dummy pulldown form">
            <div>
                <!-- プルダウン + ラベル -->
                <label for="prefecture" style="font-weight: bold;" class="form_label">順位</label><br>
                <select id="prefecture" name="prefecture">
                    <option value="">選択</option>
                    <option value="1">1位</option>
                    <option value="2">2位</option>
                    <option value="3">3位</option>
                    <option value="4">4位</option>
                </select>
            </div>

            <!-- テキストボックス -->
            <div>
                <label for="comment" class="form_label">コメント</label><br>
                <input type="text" class="text_input" id="comment" name="comment">
            </div>

            <!-- テキストエリア -->
            <div>
                <label for="description" class="form_label">競技説明</label><br>
                <textarea class="text_input" name="description" id="description" cols="150" rows="8"></textarea>
            </div>

            <!-- ボタン各種 -->
            <!-- 画像選択 -->
            <div>
                <button type="submit" class="gazou btn">画像選択</button>
            </div>
            <!-- 削除 -->
            <div>
                <button type="submit" class="delete btn">削除</button>
            </div>
            <!-- 更新 -->
            <div>
                <button type="submit" class="update gazou btn">更新</button>
            </div>
            <div>
                <button type="button" class="update return btn">戻る</button>
            </div>
        </form>

        <!-- メニュー -->
        <div class="menu">
            <!-- home -->
            <a href="../templates/index.html" class="menu item">
                <span class="menu_link">
                    <img src="img/icon/Home.webp" alt="home" class="frame">
                    home
                </span>
            </a>
            <!-- schedule -->
            <a href="../templates/index.html" class="menu item">
                <span class="menu_link">
                    <img src="img/icon/Calendar.webp" alt="home" class="frame">
                    schedule
                </span>
            </a>
        </div>

        <!-- 画像UI -->
        <div class="image_center">
            <div class="image_item">
                <img src="img/icon/イメージファイルアイコン.webp" alt="イメージ">
            </div>
        </div>

    </main>
</body>

</html>

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- リセットcss -->
    <link rel="stylesheet" href="https://unpkg.com/modern-css-reset/dist/reset.min.css" />
    <!-- bootstorap リンク -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"> -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<style>
    /* googleFont */
    .quantico-regular {
    font-family: "Quantico", sans-serif;
    font-weight: 400;
    font-style: normal;
    }

    .quantico-bold {
    font-family: "Quantico", sans-serif;
    font-weight: 700;
    font-style: normal;
    }

    .quantico-regular-italic {
    font-family: "Quantico", sans-serif;
    font-weight: 400;
    font-style: italic;
    }

    .quantico-bold-italic {
    font-family: "Quantico", sans-serif;
    font-weight: 700;
    font-style: italic;
    }

    .container {
        width: 90%;
        margin: 0 auto;
    }
    body {
        background-color: black;
    }

    /* ランキング */
    p,
    h1,
    h2,
    h3,
    h4 {
        color: #fff;
        margin: 0px;
    }

    .ranking_user {
        gap: 10px;
        display: flex;
        flex-flow: column;
    }

    ul {
        list-style: none;
        padding-left: 0;
    }

    /* 共通画像 */
    .crown {
        width: 50px;
        margin: 0 auto;
    }

    .crown img {
        width: 100%;
        height: auto;
    }

    /* 共通余白 */
    .ranking_item,
    .ranking_one,
    .ranking_two,
    .ranking_three {
        padding: 1rem;
    }

    /* 文字の位置調整 */
    .ranking_one,
    .ranking_two,
    .ranking_three {
        text-align: center;
    }

    /* 第一位 */
    .winner_font {
        font-size: 32px;
        font-weight: bold;
        -webkit-text-stroke: 1px #E3AD17;
        text-shadow: #EFFF62 4px 4px 10px;
    }
    
    .ranking_user .ranking_one {
        border: #FFEBC1 1px solid;
        box-shadow: 0px 0px 10px 5px #EFFF62;
        background: linear-gradient(to right, #FFD000, #C26E00);
        width: 100%;
    }

    /* 第二位 */
    .ranking_user .ranking_two {
        border: #FFFFFF 1px solid;
        background: linear-gradient(to right, #A6A6A6, #6B6B6B);
        width: 100%;
    }

    .ranking_user .ranking_two .crown {
        margin-bottom: 0.5rem;
    }

    /* 第三位 */
    .ranking_user .ranking_three {
        border: #FFA57E 1px solid;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(to right, #DC4200, #651E00);
        width: 100%;
    }

    .ranking_user .ranking_three .crown {
        margin: 0px;
    }

    /*その他ランキング*/
    .ranking_others {
        max-height: 200px;
        overflow-y: scroll;
        padding-right: 20px;
    }

    .ranking_item {
        border: #0000FF 1px solid;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        color: white;
        background-color: #00009B;
        width: 100%;
    }

    /* スクロールバー */

    article {
        padding: 8px 40px;
        background-color: #eee;
    }

    article+article {
        border-top: 2px dashed #fff;
    }

    .ranking_others::-webkit-scrollbar,
    .list_admin::-webkit-scrollbar {
        width: 16px;
    }

    .ranking_others::-webkit-scrollbar-track,
    .list_admin::-webkit-scrollbar-track {
        background-color: #5D5D5D;
    }

    .ranking_others::-webkit-scrollbar-thumb,
    .list_admin::-webkit-scrollbar-thumb {
        background-color: #fff;
    }


    /* 管理画面でのリスト */
    .list_admin{
        display: flex;
        flex-flow: column;
        gap: 10px;
        max-height: 200px;
        overflow-y: scroll;
        padding-right: 20px;
    }
    .list_item{
        padding: 1rem;
        background-color: rgba(255, 255, 255, 0.3);
    }
</style>

<body>
    <div class="container">
        <ul class="ranking_user">
            <li class="ranking_one">
                <div class="crown"><img src="./img_crown/mark_oukan_crown1.png" alt=""></div>
                <p class="winner_font quantico-regular">WINNER!!</p>
                <h1>総合、高度3,4年</h1>
                <h2>00pt</h2>
            </li>
            <li class="ranking_two">
                <div class="crown"><img src="./img_crown/mark_oukan_crown2.png" alt=""></div>
                <h2>総合、高度3,4年</h2>
                <h3>00pt</h3>
            </li>
            <li class="ranking_three">
                <div class="crown"><img src="./img_crown/mark_oukan_crown3.png" alt=""></div>
                <h3>総合、高度3,4年</h3>
                <h4>00pt</h4>
            </li>

        </ul>
        <ul class="ranking_user ranking_others">
            <li class="ranking_item">
                <p>テキスト</p>
                <p>00pt</p>
            </li>
            <li class="ranking_item">
                <p>テキスト</p>
                <p>00pt</p>
            </li>
            <li class="ranking_item">
                <p>テキスト</p>
                <p>00pt</p>
            </li>
            <li class="ranking_item">
                <p>テキスト</p>
                <p>00pt</p>
            </li>
        </ul>

        <ul class="list_admin">
            <li class="list_item"><p>テキスト</p></li>
            <li class="list_item"><p>テキスト</p></li>
            <li class="list_item"><p>テキスト</p></li>
            <li class="list_item"><p>テキスト</p></li>
            <li class="list_item"><p>テキスト</p></li>
            <li class="list_item"><p>テキスト</p></li>
        </ul>
    </div>

    <!-- bootstrap JS -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->
</body>

</html>

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Final Simple Gradient</title>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@700&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
        }

        /* 1. 【背景】スクロールと一緒に普通に動く長いグラデーション */
        body {
            /* 上が #FF00EE、下が #3C0038 の大きな板を作る */
            background: linear-gradient(to bottom, #FF00EE 0%, #3C0038 100%);
            overflow-y: scroll;
            background-attachment: fixed;
        }

        /* 3. 【文字】背景の上に置く */
        .content-container {
            width: 100%;
        }

        .section {
            height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 10vh;
            box-sizing: border-box;
            color: white;
            font-family: sans-serif;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        img {
            width: 640px;
            height: 640px;
            opacity: 0.13;
            position: fixed;
            top: 0px;
            left: 0px;
        }

        /*日本語メイン*/
        .NotoSansJP {
            font-family: 'Noto Sans JP';
            font-size: 3.5rem;
            font-weight: bold;
            /* 少し大きく */
            color: #ffccff;
            /* 少し色味を変える */
        }

        /*見出し・順位・ボタンなど*/
        .Main {
            font-family: 'Quantico';
            font-size: 3.5rem;
            font-weight: bold;
            /* 少し大きく */
            color: #ffccff;
            /* 少し色味を変える */
        }

        /*項目 */
        .Item {
            font-family: 'Inter';
            font-size: 3.5rem;
            font-weight: bold;
            /* 少し大きく */
            color: #ffccff;
            /* 少し色味を変える */
        }

        /*説明・詳細 */
        .details {
            font-family: 'Noto Sans JP';
            font-size: 3.5rem;
            font-weight: bold;
            /* 少し大きく */
            color: #ffccff;
            /* 少し色味を変える */
        }
    </style>
</head>

<body>
    <img src="/static/texture.png">
    <div class="content-container">
        <div class="details">Noto Sans JP</div>
        <div class="Main">Quantico</div>
        <div class="Item">Inter</div>
    </div>




</body>

</html>

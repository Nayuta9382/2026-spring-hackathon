<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Final Simple Gradient</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Noto+Sans+JP:wght@700&family=Quantico:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        /* 共通のスクリーン設定 */
        .user_screen,
        .admin_screen {
            height: 50vh;
            /* 画面の半分の高さ */
            overflow-y: auto;
            /* 中身が多い時だけスクロール */
            position: relative;
            /* 画像の配置基準にする */
            width: 100%;
        }

        .user_screen {
            background: linear-gradient(to bottom, #4800CF 0%, #000000 100%);
        }

        .admin_screen {
            background: linear-gradient(to bottom, #FF00EE 0%, #3C0038 100%);
        }

        /* 3. 【文字】背景の上に置く */
        .content_container {
            width: 100%;
        }

        /*背景の画像*/
        .bg_overlay_image {
            width: 640px;
            height: 640px;
            opacity: 0.13;
            position: absolute;
            top: 0px;
            left: 0px;
        }


        .text_accent,
        .text_label,
        .text_description {
            font-size: 3.5rem;
            font-weight: bold;
            color: #ffccff;
            /* 背景が暗い想定の明るい色 */
            margin-bottom: 20px;
        }

        /*見出し・順位・ボタンなど*/
        .text_accent {
            font-family: 'Quantico';
        }

        /*項目・ラベル */
        .text_label {
            font-family: 'Inter';
        }

        /*説明・詳細 */
        .text_description {
            font-family: 'Noto Sans JP';
        }
    </style>
</head>

<body>
    <div class="user_screen">
        <img src="/static/texture.png" class="bg_overlay_image">
        <div>aa</div>
        <div class="content_container">
            <div class="text_description">Noto Sans JP</div>
            <div class="text_accent">Quantico</div>
            <div class="text_label">Inter</div>
        </div>
    </div>


    <div class="admin_screen">
        <img src="/static/texture.png" class="bg_overlay_image">
        <div>aa</div>
        <div class="content_container">
            <div class="text_description">Noto Sans JP</div>
            <div class="text_accent">Quantico</div>
            <div class="text_label">Inter</div>
        </div>
    </div>




</body>

</html>

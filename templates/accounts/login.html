{% extends 'layouts/admin-layout.html' %}

{% block title %}ログイン{% endblock title %}

{% block content %}
<h1>ログイン</h1>

<form method="post">
    {% csrf_token %}

    {# ユーザー名 / ID #}
    <div>
        <label>ユーザー名</label>
        <input type="text" name="username" required>
    </div>

    {# パスワード #}
    <div>
        <label>パスワード</label>
        <input type="password" name="password" required>
    </div>

    {# 送信ボタン #}
    <button type="submit">ログイン</button>
</form>

{# エラーメッセージがある場合の表示 #}
{% if form.errors %}
    <div>
        <p>ユーザー名またはパスワードが正しくありません。</p>
    </div>
{% endif %}

{% endblock content %}
